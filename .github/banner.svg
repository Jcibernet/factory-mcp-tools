<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-label="factory-mcp-tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="0.5" stop-color="#4f7cff"/>
      <stop offset="1" stop-color="#2d5bff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="0" flood-color="#1b2a66" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="900" height="260" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="258" rx="15" fill="none" stroke="#1c2747" stroke-width="2"/>

  <g fill="#16203c">
    <rect x="40" y="40" width="6" height="6"/>
    <rect x="60" y="40" width="6" height="6"/>
    <rect x="820" y="210" width="6" height="6"/>
    <rect x="840" y="210" width="6" height="6"/>
    <rect x="40" y="210" width="6" height="6"/>
    <rect x="840" y="40" width="6" height="6"/>
  </g>

  <text x="50%" y="118" text-anchor="middle"
        font-family="'Courier New', ui-monospace, monospace"
        font-size="72" font-weight="700" letter-spacing="1"
        fill="url(#blue)" filter="url(#shadow)">factory-mcp-tools</text>

  <rect x="200" y="152" width="500" height="3" rx="1.5" fill="#2d5bff" opacity="0.6"/>

  <text x="50%" y="190" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="20" font-weight="500" letter-spacing="3"
        fill="#9fb4e6">MCPs on-demand para Droid</text>

  <text x="50%" y="222" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="14" letter-spacing="1.5"
        fill="#5b6b94">toggle &#183; ahorra contexto &#183; restart + resume</text>
</svg>
